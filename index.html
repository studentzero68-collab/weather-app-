<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyline Weather</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app">
        <header class="app-header">
            <p class="eyebrow">Live weather</p>
            <h1>Skyline</h1>
            <p class="app-subtitle">Search any city to see current conditions.</p>
        </header>

        <form class="search-bar" id="search-form">
            <input type="text" id="city-input" placeholder="Search a city (e.g. Johannesburg)">
            <button type="submit">Search</button>
        </form>

        <main class="app-main" id="app-main">
            <p class="app-hint">Search for a city to get started.</p>
        </main>
        <footer class="app-footer">
            <p>© 2026 Mukelani Nkazimulo Sindana</p>
            <p class="footer-links">
                <a href="https://github.com/studentzero68-collab" target="_blank" rel="noopener noreferrer">GitHub</a>
                <span aria-hidden="true">·</span>
                <a href="mailto:studentzero68@gmail.com">Email</a>
            </p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
